name: Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # Don't persist GITHUB_TOKEN as a git credential, otherwise pip's
        # `git clone` of unitares-core (or any other public repo) sends it
        # as a 401-eliciting auth header and falls back to a no-TTY prompt.
        persist-credentials: false

    - name: Checkout unitares-core (private)
      uses: actions/checkout@v4
      with:
        repository: CIRWEL/unitares-core
        token: ${{ secrets.UNITARES_CORE_TOKEN }}
        path: unitares-core

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cython
        cd unitares-core && USE_CYTHON=1 pip install . && cd ..
        pip install -r requirements-full.txt

    - name: Validate CI/Python version sync
      run: |
        python scripts/dev/check_ci_python_version_sync.py

    - name: Validate CI matrix matches pyproject requires-python
      run: |
        python scripts/diagnostics/check_ci_python_matrix_sync.py

    - name: Check doc drift
      run: |
        python scripts/diagnostics/check_doc_drift.py

    - name: Run smoke tests
      run: |
        make test-smoke

  test:
    runs-on: ubuntu-latest
    needs: smoke

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # Don't persist GITHUB_TOKEN as a git credential, otherwise pip's
        # `git clone` of unitares-core (or any other public repo) sends it
        # as a 401-eliciting auth header and falls back to a no-TTY prompt.
        persist-credentials: false

    - name: Checkout unitares-core (private)
      uses: actions/checkout@v4
      with:
        repository: CIRWEL/unitares-core
        token: ${{ secrets.UNITARES_CORE_TOKEN }}
        path: unitares-core

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cython
        cd unitares-core && USE_CYTHON=1 pip install . && cd ..
        pip install -r requirements-full.txt

    - name: Validate CI/Python version sync
      run: |
        python scripts/dev/check_ci_python_version_sync.py

    - name: Validate CI matrix matches pyproject requires-python
      run: |
        python scripts/diagnostics/check_ci_python_matrix_sync.py

    - name: Check doc drift
      run: |
        python scripts/diagnostics/check_doc_drift.py

    - name: Run tests with coverage
      run: |
        python -m pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=html

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/

    - name: Run tool count validation
      continue-on-error: true
      run: |
        python scripts/analysis/count_tools.py --json
