version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      runtime-deps:
        patterns:
          - "mcp"
          - "numpy"
          - "uvicorn"
          - "starlette"
          - "websockets"
          - "asyncpg"
          - "redis"
          - "orjson"
          - "aiofiles"
          - "psutil"
          - "prometheus-client"
          - "requests"
          - "python-dotenv"
          - "sentence-transformers"
        update-types:
          - "minor"
          - "patch"
      dev-deps:
        patterns:
          - "pytest*"
          - "hypothesis"
          - "scipy"
          - "matplotlib"
          - "editdistance"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "ci"
